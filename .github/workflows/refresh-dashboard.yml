name: Refresh dashboard data

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history, not the default shallow (fetch-depth: 1) clone -
          # the retry loop below rebases onto origin/main if something else
          # pushed during the run, and rebase needs a real common ancestor
          # to work with, which a 1-commit-deep checkout doesn't have.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install -r requirements.txt

      - run: python run_pipeline.py
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}
          SEC_EDGAR_USER_AGENT: ${{ secrets.SEC_EDGAR_USER_AGENT }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}

      - name: Commit updated data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard-web/data/dashboard_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Refresh dashboard data"
          # The checkout can go stale during the ~90s pipeline run if anything
          # else pushes to main in the meantime (a manual commit, another
          # workflow run). A plain push would reject as non-fast-forward, so
          # rebase onto the latest main and retry a few times before giving up.
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt), rebasing onto latest main and retrying..."
            git fetch origin main
            git rebase origin/main
          done
          echo "Failed to push after 3 attempts"
          exit 1
